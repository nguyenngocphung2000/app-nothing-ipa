<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOTHING</title>
    
    <link rel="stylesheet" href="css/lexend/index.css">
    <script src="js/tailwindcss.js"></script>
    <script src="js/marked.min.js" defer></script>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="favicon.svg">
    <link rel="apple-touch-icon-precomposed" href="favicon.svg">
</head>
<body class="text-slate-800 transition-colors duration-500 overflow-hidden bg-transparent relative pointer-events-none">
    
    <!-- BACKGROUND CHUẨN IOS VIVID -->
    <div class="fixed inset-0 z-[-10] bg-slate-50 dark:bg-black transition-colors duration-500"></div>
    <div class="ambient-orb-1"></div>
    <div class="ambient-orb-2"></div>
    <div class="ambient-orb-3"></div>

    <!-- THANH ĐIỀU HƯỚNG NATIVE APP (Sẽ ẩn ở Home, hiện ở Tool) -->
    <div id="native-app-bar" class="fixed top-0 left-0 right-0 z-[9999] transition-all duration-500 transform -translate-y-full opacity-0 pointer-events-none glass-border-bottom app-bar-safe-padding">
        <div class="max-w-[1600px] mx-auto px-4 flex items-center justify-between pointer-events-auto w-full">
            <button id="btn-back-home" class="flex items-center gap-1.5 focus:outline-none transition active:scale-90 group px-2 py-1 -ml-2">
                <!-- Mũi tên SVG siêu gọn -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400 group-hover:text-orange-500 transition-colors w-5 h-5"><path d="m15 18-6-6 6-6"/></svg>
                <span class="font-bold text-[11px] md:text-[12px] uppercase tracking-widest text-slate-500 group-hover:text-orange-500 transition-colors">Trang Chủ</span>
            </button>

            <!-- Tên Tool hiển thị động (Tuỳ chọn hiển thị thêm sau này) -->
            <span id="current-tool-name" class="absolute left-1/2 -translate-x-1/2 font-extrabold text-[13px] uppercase text-slate-800 dark:text-slate-200 tracking-wider hidden sm:block opacity-0 transition-opacity">N/A</span>

            <button onclick="toggleDarkMode()" class="p-2 rounded-full bg-black/5 dark:bg-white/10 text-slate-500 dark:text-slate-300 hover:text-orange-500 transition border border-black/5 dark:border-white/10 relative overflow-hidden active:scale-90 flex items-center justify-center w-9 h-9" id="dark-mode-btn" title="Giao diện Tối/Sáng">
                <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 hidden absolute transition-transform duration-500 rotate-90 scale-50"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 absolute transition-transform duration-500"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            </button>
        </div>
    </div>

    <!-- KHUNG CHỨA TOÀN BỘ ỨNG DỤNG -->
    <main id="app-container" class="w-full h-[100dvh] overflow-y-auto overflow-x-hidden custom-scrollbar app-container-safe-padding pointer-events-auto">
        <!-- Các nội dung sẽ được JS Đổ vào đây -->
    </main>

    <script type="module" src="js/core.js"></script>

    <!-- GLASS BOTTOM SHEET MODAL (Global) -->
    <div id="global-bottom-sheet" class="fixed inset-0 z-[10000] pointer-events-none opacity-0 transition-opacity duration-300">
        <!-- Backdrop -->
        <div id="bs-backdrop" class="absolute inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm transition-opacity duration-300"></div>
        <!-- Sheet Container -->
        <div id="bs-container" class="absolute bottom-0 left-0 right-0 h-[92vh] bg-white dark:bg-[#0a0a0a] rounded-t-[2rem] shadow-2xl glass-border-bottom transform translate-y-full transition-transform duration-500 cubic-bezier-out flex flex-col pointer-events-auto">
            <!-- Header có thanh vuốt nhỏ -->
            <div id="bs-header" class="flex flex-col items-center justify-center pt-3 pb-2 cursor-grab active:cursor-grabbing border-b border-black/5 dark:border-white/5 shrink-0 relative bg-white/50 dark:bg-[#0a0a0a]/50 backdrop-blur-md rounded-t-[2rem]">
                <div class="w-12 h-1.5 bg-slate-300 dark:bg-slate-700 rounded-full mb-3"></div>
                <h3 id="bs-title" class="text-[14px] md:text-[16px] font-black uppercase tracking-wider text-slate-800 dark:text-white px-4 text-center line-clamp-1 w-3/4">Tile</h3>
                
                <!-- Nút Đóng -->
                <button id="bs-close-btn" class="absolute right-4 top-4 p-2 rounded-full bg-slate-100 dark:bg-white/10 text-slate-500 hover:text-orange-500 transition active:scale-90 focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            
            <!-- Nội Dung -->
            <div id="bs-content" class="flex-1 overflow-y-auto custom-scrollbar p-5 md:p-8 relative overscroll-contain" style="-webkit-overflow-scrolling: touch;">
                <!-- Nội dung Markdown render vào đây -->
            </div>
        </div>
    </div>
    
    <script> document.body.classList.remove("pointer-events-none"); </script>
</body>
</html>
