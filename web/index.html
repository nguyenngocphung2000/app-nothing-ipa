<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOTHING</title>
    
    <link rel="stylesheet" href="css/lexend/index.css">
    <script src="js/tailwindcss.js"></script>
    <script src="js/marked.min.js" defer></script>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="favicon.svg">
    <link rel="apple-touch-icon-precomposed" href="favicon.svg">
</head>
<body class="text-slate-800 transition-colors duration-500 overflow-hidden bg-slate-50 relative pointer-events-none">
    
    <!-- THANH ĐIỀU HƯỚNG NATIVE APP (Sẽ ẩn ở Home, hiện ở Tool) -->
    <div id="native-app-bar" class="fixed top-0 left-0 right-0 z-[9999] transition-all duration-500 transform -translate-y-full opacity-0 pointer-events-none pb-2 pt-[calc(env(safe-area-inset-top)+10px)] backdrop-blur-2xl glass-border-bottom">
        <div class="max-w-[1600px] mx-auto px-4 flex items-center justify-between pointer-events-auto">
            <button id="btn-back-home" class="flex items-center gap-1.5 focus:outline-none transition active:scale-95 group">
                <!-- Mũi tên Typographic siêu gọn -->
                <span class="text-2xl font-light text-slate-400 group-hover:text-orange-500 transition-colors -mt-0.5">&lsaquo;</span>
                <span class="font-bold text-[10px] md:text-[11px] uppercase tracking-widest text-slate-500 group-hover:text-orange-500 transition-colors">Trang Chủ</span>
            </button>

            <!-- Tên Tool hiển thị động (Tuỳ chọn hiển thị thêm sau này) -->
            <span id="current-tool-name" class="absolute left-1/2 -translate-x-1/2 font-extrabold text-[12px] uppercase text-slate-700 tracking-wider hidden sm:block opacity-0 transition-opacity">N/A</span>

            <button onclick="toggleDarkMode()" class="px-3 md:px-4 py-1.5 rounded-full bg-black/5 dark:bg-white/10 text-slate-500 dark:text-slate-300 hover:text-orange-500 transition border border-black/5 dark:border-white/10 font-bold text-[9px] md:text-[10px] uppercase tracking-[0.2em] relative overflow-hidden" id="dark-mode-btn" title="Giao diện Tối/Sáng">
                <span id="text-sun" class="hidden">SÁNG</span>
                <span id="text-moon" class="">TỐI</span>
            </button>
        </div>
    </div>

    <!-- KHUNG CHỨA TOÀN BỘ ỨNG DỤNG -->
    <main id="app-container" class="w-full h-[100dvh] overflow-y-auto overflow-x-hidden custom-scrollbar pt-[env(safe-area-inset-top)] pb-[env(safe-area-inset-bottom)] pointer-events-auto">
        <!-- Các nội dung sẽ được JS Đổ vào đây -->
    </main>

    <script type="module" src="js/core.js"></script>
    
    <!-- Loại bỏ lỗi Flash Screen lúc load: bật pointer-events lại -->
    <script> document.body.classList.remove("pointer-events-none"); </script>
</body>
</html>
