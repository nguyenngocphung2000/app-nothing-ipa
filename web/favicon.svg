<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="60" />
    </filter>
  </defs>
  
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  
  <!-- Glowing backdrops -->
  <circle cx="350" cy="350" r="200" fill="#ea580c" opacity="0.4" filter="url(#blur)" />
  <circle cx="700" cy="700" r="250" fill="#38bdf8" opacity="0.2" filter="url(#blur)" />
  
  <!-- Sleek N -->
  <path d="M 320 280 L 410 280 L 610 600 L 610 280 L 700 280 L 700 744 L 610 744 L 410 424 L 410 744 L 320 744 Z" fill="url(#glass)"/>
  <circle cx="655" cy="250" r="50" fill="url(#orange)"/>
</svg>